name: Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # 每 1 小時執行一次

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH tunnel to VPS Qdrant
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          # 建立 SSH tunnel：本機 localhost:6333 → VPS localhost:6333
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=3 \
              -i ~/.ssh/id_rsa \
              -L 6333:localhost:6333 \
              -N -f \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}

      - name: Write Google credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_SA_JSON }}' > credentials/py-rag-sa.json
          echo '${{ secrets.GOOGLE_DRIVE_TOKEN_JSON }}' > credentials/token.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system ./python/

      - name: Run sync
        env:
          QDRANT_URL: http://localhost:6333
          GOOGLE_APPLICATION_CREDENTIALS: credentials/py-rag-sa.json
          GOOGLE_DRIVE_TOKEN_PATH: credentials/token.json
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: us-central1
          GOOGLE_CLOUD_LLM_LOCATION: global
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECTS: ${{ secrets.GITLAB_PROJECTS }}
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_IDS: ${{ secrets.TRELLO_BOARD_IDS }}
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SYNC_CHANNEL: ${{ secrets.SLACK_SYNC_CHANNEL }}
        run: PYTHONPATH=$GITHUB_WORKSPACE python -m sync.sync
